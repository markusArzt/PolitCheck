<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PolitCheck Österreich – Wahlversprechen 2024 vs. Abstimmungsverhalten im Nationalrat" />
  <title>PolitCheck Österreich</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div>
    <h1>PolitCheck <span style="font-size:14px;font-weight:400;color:var(--muted)">Österreich</span></h1>
    <div class="header-subtitle">Wahlversprechen 2024 · Nationalrat XXVIII. GP</div>
  </div>
  <button class="menu-btn" onclick="toggleMenu()" aria-label="Menü öffnen">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <circle cx="8" cy="8" r="6.5"/>
      <circle cx="5.5" cy="8" r=".8" fill="currentColor" stroke="none"/>
      <circle cx="8"   cy="8" r=".8" fill="currentColor" stroke="none"/>
      <circle cx="10.5" cy="8" r=".8" fill="currentColor" stroke="none"/>
    </svg>
  </button>
</header>

<!-- ── Menu overlay ── -->
<div class="menu-overlay" id="menu-overlay">
  <div class="menu-backdrop" onclick="closeMenu()"></div>
  <div class="menu-panel">
    <div class="menu-item" id="mi-promises" onclick="nav('promises')">
      <span class="menu-item-icon">&#9654;</span>
      <span class="menu-item-label">Versprechen</span>
    </div>
    <div class="menu-item" id="mi-votes" onclick="nav('votes')">
      <span class="menu-item-icon">&#9776;</span>
      <span class="menu-item-label">Alle Abstimmungen</span>
    </div>
  </div>
</div>

<main>

  <!-- ── Page: Versprechen ── -->
  <section class="page active" id="page-promises">

    <div class="nav-section">
      <div class="nav-label">Thema</div>
      <div class="pill-row" id="theme-pills"></div>
    </div>

    <div class="nav-section" id="sub-section">
      <div class="nav-label">Bereich</div>
      <div class="pill-row" id="sub-pills"></div>
    </div>

    <div class="party-scroll" id="parties"></div>

    <div class="summary" id="summary"></div>

    <div class="list-header">
      <span class="list-title">Versprechen</span>
      <span class="list-count" id="list-count"></span>
    </div>
    <div class="promise-list" id="promise-list"></div>

  </section>

  <!-- ── Page: Alle Abstimmungen ── -->
  <section class="page" id="page-votes">
    <div class="votes-meta">XXVIII. GP · ab 24.10.2024 · ~65 Beschlüsse geclustert</div>
    <div id="cluster-list"></div>
  </section>

</main>

<script src="data/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
